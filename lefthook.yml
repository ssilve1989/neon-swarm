pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}"
      run: bunx --bun biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    doc-sync-check:
      run: |
        changed=$(git diff --cached --name-only -- 'src/systems/*.ts' 'src/ui/*.ts' 2>/dev/null)
        if [ -n "$changed" ]; then
          staged_docs=$(git diff --cached --name-only -- 'design/gdd/*.md' 2>/dev/null)
          if [ -z "$staged_docs" ]; then
            echo ""
            echo "WARNING: gameplay system source changed with no design/gdd doc staged."
            echo "If mechanics, formulas, or tuning values changed, update the relevant doc."
            echo ""
          fi
        fi

commit-msg:
  commands:
    commitlint:
      run: bunx --bun commitlint --edit {1}
