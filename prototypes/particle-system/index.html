<!DOCTYPE html>
<!-- PROTOTYPE - NOT FOR PRODUCTION -->
<!-- Question: Can PixiJS render 10,000+ additive-blended particles at stable 60fps? -->
<!-- Date: 2026-03-22 -->
<html>
<head>
    <meta charset="utf-8">
    <title>Particle System Prototype</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        #ui {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.8;
            user-select: none;
            z-index: 10;
        }
        #fps { color: #0f0; font-size: 18px; font-weight: bold; }
        #frame-time { color: #aaa; font-size: 12px; }
        .controls { margin-top: 8px; display: flex; gap: 4px; }
        button {
            padding: 4px 10px;
            background: #111;
            color: #aaa;
            border: 1px solid #333;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
        }
        button:hover { border-color: #888; color: #fff; }
        button.active { background: #222; border-color: #0ff; color: #0ff; }
        #warning {
            margin-top: 6px;
            color: #f80;
            font-size: 11px;
            display: none;
        }
    </style>
</head>
<body>
<div id="ui">
    <div id="fps">FPS: --</div>
    <div id="frame-time">frame: --ms  |  particles: --</div>
    <div class="controls">
        <button onclick="setCount(1000,this)">1k</button>
        <button onclick="setCount(5000,this)">5k</button>
        <button onclick="setCount(10000,this)" id="btn-10k">10k</button>
        <button onclick="setCount(15000,this)">15k</button>
        <button onclick="setCount(20000,this)">20k</button>
    </div>
    <div id="warning">FPS below 50 — note particle count</div>
</div>

<script src="https://pixijs.download/release/pixi.min.js"></script>
<script>
// PROTOTYPE - NOT FOR PRODUCTION
// Question: Can PixiJS render 10,000+ additive-blended particles at stable 60fps?
// Date: 2026-03-22

(async () => {
    const app = new PIXI.Application();
    await app.init({
        resizeTo: window,
        backgroundColor: 0x000000,
        antialias: false,
        preference: 'webgl',
        powerPreference: 'high-performance',
    });
    document.body.appendChild(app.canvas);

    // --- Texture: small radial glow (white circle, soft edge via alpha) ---
    const GFX_SIZE = 16;
    const gfx = new PIXI.Graphics();
    // Outer soft ring
    gfx.circle(GFX_SIZE / 2, GFX_SIZE / 2, GFX_SIZE / 2);
    gfx.fill({ color: 0xffffff, alpha: 0.15 });
    // Bright core
    gfx.circle(GFX_SIZE / 2, GFX_SIZE / 2, GFX_SIZE / 4);
    gfx.fill({ color: 0xffffff, alpha: 1.0 });
    const texture = app.renderer.generateTexture(gfx);

    // Neon colors: cyan, magenta, violet, green, orange, white
    const COLORS = [0x00ffff, 0xff00ff, 0x7700ff, 0x00ff88, 0xff4400, 0xccccff];

    let particles = [];
    const container = new PIXI.Container();
    app.stage.addChild(container);

    // --- FPS tracking ---
    const fpsSamples = [];
    const frameStart = 0;

    function createParticles(count) {
        container.removeChildren();
        particles = [];
        fpsSamples.length = 0;

        const W = app.screen.width;
        const H = app.screen.height;

        for (let i = 0; i < count; i++) {
            const sprite = new PIXI.Sprite(texture);
            sprite.anchor.set(0.5);
            sprite.blendMode = 'add';
            sprite.x = Math.random() * W;
            sprite.y = Math.random() * H;
            sprite.alpha = 0.5 + Math.random() * 0.5;
            sprite.scale.set(0.3 + Math.random() * 1.2);
            sprite.tint = COLORS[i % COLORS.length];

            const speed = 0.4 + Math.random() * 0.8;
            const angle = Math.random() * Math.PI * 2;

            particles.push({
                sprite,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
            });

            container.addChild(sprite);
        }

        document.getElementById('frame-time').textContent =
            `frame: --ms  |  particles: ${count.toLocaleString()}`;
        document.getElementById('warning').style.display = 'none';
    }

    window.setCount = (n, btn) => {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        createParticles(n);
    };

    // Init at 10k
    document.getElementById('btn-10k').classList.add('active');
    createParticles(10000);

    // --- Game loop ---
    let frameCount = 0;
    let lastFpsUpdate = performance.now();

    app.ticker.add((ticker) => {
        const W = app.screen.width;
        const H = app.screen.height;
        const dt = ticker.deltaTime; // normalized to 60fps (1.0 = on time)

        const t0 = performance.now();

        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.sprite.x += p.vx * dt;
            p.sprite.y += p.vy * dt;
            // Screen wrap
            if (p.sprite.x < 0) p.sprite.x += W;
            else if (p.sprite.x > W) p.sprite.x -= W;
            if (p.sprite.y < 0) p.sprite.y += H;
            else if (p.sprite.y > H) p.sprite.y -= H;
        }

        const frameMs = performance.now() - t0;

        // Update FPS display every 30 frames
        frameCount++;
        if (frameCount % 30 === 0) {
            const now = performance.now();
            const fps = Math.round(30000 / (now - lastFpsUpdate));
            lastFpsUpdate = now;

            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('frame-time').textContent =
                `js: ${frameMs.toFixed(2)}ms  |  particles: ${particles.length.toLocaleString()}`;

            const warning = document.getElementById('warning');
            if (fps < 50) {
                warning.style.display = 'block';
                document.getElementById('fps').style.color = '#f44';
            } else if (fps < 58) {
                document.getElementById('fps').style.color = '#f80';
                warning.style.display = 'none';
            } else {
                document.getElementById('fps').style.color = '#0f0';
                warning.style.display = 'none';
            }
        }
    });
})();
</script>
</body>
</html>
